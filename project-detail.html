<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details - Wenamy Ghana Ltd</title>
  
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    /* Project Detail Page Styles */
    :root {
      --primary-blue: #0ea5e9;
      --primary-blue-dark: #0284c7;
      --text-dark: #1e293b;
      --text-gray: #64748b;
      --bg-light: #f8fafc;
      --border-light: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      color: var(--text-dark);
      line-height: 1.6;
    }

    /* Header */
    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      border-bottom: 1px solid var(--border-light);
    }

    .detail-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .detail-logo img {
      width: 40px;
      height: 40px;
    }

    .detail-logo span {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-gray);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .back-btn:hover {
      color: var(--text-dark);
    }

    /* Breadcrumb */
    .breadcrumb {
      padding: 24px 48px;
      color: var(--text-gray);
      font-size: 14px;
    }

    .breadcrumb a {
      color: var(--text-gray);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: var(--primary-blue);
    }

    .breadcrumb span {
      margin: 0 8px;
    }

    /* Main Content */
    .project-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 48px 48px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    /* Image Section */
    .image-section {
      position: sticky;
      top: 24px;
    }

    .main-image {
      width: 100%;
      height: 500px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .thumbnail-gallery {
      display: flex;
      gap: 12px;
    }

    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .thumbnail:hover,
    .thumbnail.active {
      border-color: var(--primary-blue);
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Info Section */
    .info-section {
      padding-top: 8px;
    }

    .location-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary-blue);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .project-title {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .project-description {
      color: var(--text-gray);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* Specs Cards */
    .specs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .spec-card {
      background: var(--bg-light);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .spec-icon {
      width: 32px;
      height: 32px;
      margin: 0 auto 8px;
      color: var(--primary-blue);
    }

    .spec-label {
      font-size: 13px;
      color: var(--text-gray);
      margin-bottom: 4px;
    }

    .spec-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-dark);
    }

    /* Price Box */
    .price-box {
      background: var(--primary-blue);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .price-label {
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 4px;
    }

    .price-value {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
    }

    /* Action Buttons */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--primary-blue);
      color: #fff;
      padding: 16px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary:hover {
      background: var(--primary-blue-dark);
    }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #fff;
      color: var(--text-dark);
      padding: 16px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--border-light);
      transition: all 0.3s;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-secondary:hover {
      border-color: var(--primary-blue);
      color: var(--primary-blue);
    }

    /* Bottom Section */
    .bottom-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 48px;
      margin-top: 64px;
      padding-top: 48px;
      border-top: 1px solid var(--border-light);
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 24px;
    }

    /* Features Grid */
    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-light);
      border-radius: 8px;
    }

    .feature-check {
      width: 24px;
      height: 24px;
      background: var(--primary-blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
    }

    .feature-text {
      font-size: 14px;
      color: var(--text-dark);
    }

    /* Contact Card */
    .contact-card {
      background: var(--bg-light);
      border-radius: 12px;
      padding: 24px;
    }

    .contact-card p {
      color: var(--text-gray);
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      color: var(--text-dark);
      text-decoration: none;
      font-size: 15px;
    }

    .contact-item:hover {
      color: var(--primary-blue);
    }

    .contact-icon {
      width: 20px;
      height: 20px;
      color: var(--text-gray);
    }

    /* Not Found State */
    .not-found {
      text-align: center;
      padding: 120px 48px;
    }

    .not-found h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .not-found p {
      color: var(--text-gray);
      margin-bottom: 24px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .project-grid {
        grid-template-columns: 1fr;
      }

      .image-section {
        position: static;
      }

      .bottom-section {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .detail-header,
      .breadcrumb,
      .project-container {
        padding-left: 24px;
        padding-right: 24px;
      }

      .project-title {
        font-size: 28px;
      }

      .specs-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .features-grid {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="detail-header">
    <a href="index.html" class="detail-logo">
      <img src="images/icons/logo.png" alt="Wenamy">
      <span>Wenamy</span>
    </a>
    <a href="projects.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
  </header>

  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <a href="index.html">Home</a>
    <span>/</span>
    <a href="projects.html">Projects</a>
    <span>/</span>
    <span id="breadcrumbName">Loading...</span>
  </nav>

  <!-- Main Content -->
  <main class="project-container" id="mainContent">
    <!-- Content loaded dynamically -->
  </main>

  <script src="js/projects-data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Get project ID from URL hash
      let projectId = null;
      if (window.location.hash) {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        projectId = hashParams.get('id');
      }
      
      const mainContent = document.getElementById('mainContent');
      const breadcrumbName = document.getElementById('breadcrumbName');
      
      if (!projectId || !projectsData[projectId]) {
        mainContent.innerHTML = `
          <div class="not-found">
            <h1>Project Not Found</h1>
            <p>The project you're looking for doesn't exist or has been removed.</p>
            <a href="projects.html" class="btn-primary">View All Projects</a>
          </div>
        `;
        breadcrumbName.textContent = 'Not Found';
        return;
      }
      
      const project = projectsData[projectId];
      breadcrumbName.textContent = project.name;
      
      // Generate thumbnails
      const thumbnailsHtml = project.images.map((img, index) => `
        <div class="thumbnail ${index === 0 ? 'active' : ''}" data-index="${index}" onclick="changeImage(${index})">
          <img src="${img}" alt="${project.name} ${index + 1}">
        </div>
      `).join('');
      
      // Generate features
      const featuresHtml = (project.features || project.amenities.slice(0, 8)).map(feature => `
        <div class="feature-item">
          <div class="feature-check">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <span class="feature-text">${feature}</span>
        </div>
      `).join('');
      
      // Render content
      mainContent.innerHTML = `
        <div class="project-grid">
          <!-- Image Section -->
          <div class="image-section">
            <div class="main-image">
              <img id="mainImage" src="${project.images[0]}" alt="${project.name}">
            </div>
            <div class="thumbnail-gallery">
              ${thumbnailsHtml}
            </div>
          </div>
          
          <!-- Info Section -->
          <div class="info-section">
            <div class="location-tag">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              ${project.location.split(',')[0]}
            </div>
            
            <h1 class="project-title">${project.name}</h1>
            <p class="project-description">${project.description}</p>
            
            <!-- Specs -->
            <div class="specs-grid">
              <div class="spec-card">
                <div class="spec-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 20h20M5 20v-5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v5"/>
                  </svg>
                </div>
                <div class="spec-label">Bedrooms</div>
                <div class="spec-value">${project.bedrooms}</div>
              </div>
              <div class="spec-card">
                <div class="spec-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 12h16M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                  </svg>
                </div>
                <div class="spec-label">Bathrooms</div>
                <div class="spec-value">${project.bathrooms}</div>
              </div>
              <div class="spec-card">
                <div class="spec-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M3 9h18M9 21V9"/>
                  </svg>
                </div>
                <div class="spec-label">Area</div>
                <div class="spec-value">${project.sqft} sq ft</div>
              </div>
            </div>
            
            <!-- Price -->
            <div class="price-box">
              <div class="price-label">Starting from</div>
              <div class="price-value">${project.price}+</div>
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
              <a href="tel:0243817969" class="btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
                Call Now
              </a>
              <a href="mailto:info@wenamy.com" class="btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
                Email Inquiry
              </a>
            </div>
          </div>
        </div>
        
        <!-- Bottom Section -->
        <div class="bottom-section">
          <div>
            <h2 class="section-title">Project Specifications</h2>
            <div class="features-grid">
              ${featuresHtml}
            </div>
          </div>
          
          <div class="contact-card">
            <h2 class="section-title">Get in Touch</h2>
            <p>Interested in this property? Contact us today to schedule a viewing or learn more.</p>
            
            <a href="tel:0243817969" class="contact-item">
              <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              0243817969
            </a>
            
            <a href="tel:0201050996" class="contact-item">
              <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              0201050996
            </a>
            
            <a href="mailto:info@wenamy.com" class="contact-item">
              <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              info@wenamy.com
            </a>
          </div>
        </div>
      `;
    });
    
    // Change main image
    function changeImage(index) {
      const projectId = new URLSearchParams(window.location.hash.substring(1)).get('id');
      const project = projectsData[projectId];
      
      document.getElementById('mainImage').src = project.images[index];
      
      // Update active thumbnail
      document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
        thumb.classList.toggle('active', i === index);
      });
    }
  </script>
</body>
</html>
